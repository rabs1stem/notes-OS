apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: note

spec:
  replicas: 2

  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  
  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend
    
    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: frontend
          image: ghcr.io/rabs1stem/notes-frontend:6755791e46a05b7a1529805d77ab05480ca4d2be
          imagePullPolicy: IfNotPresent

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          
          ports:
            - containerPort: 80

          startupProbe:
              httpGet:
                path: /health
                port: 80

              periodSeconds: 5
              timeoutSeconds: 3
              failureThreshold: 30
          
          readinessProbe:
              httpGet:
                path: /health
                port: 80

              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3

          livenessProbe:
              httpGet:
                path: /health
                port: 80

              initialDelaySeconds: 30
              periodSeconds: 20
              timeoutSeconds: 3
              failureThreshold: 3
