apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: postgres
  namespace: note

spec:
  serviceName: postgres-service

  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres
    
    spec:
      containers:
        - name: postgres
          image: postgres:17-bookworm
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5432

          startupProbe:
            exec:
              command:
                - pg_isready
                - -U
                - not_user

            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - not_user

            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3 

          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - not_user

            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: 100m
              memory: 256Mi

            limits:
              cpu: 1000m
              memory: 1Gi

          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key:  POSTGRES_DB

            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key:  POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key:  POSTGRES_PASSWORD
            
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc


