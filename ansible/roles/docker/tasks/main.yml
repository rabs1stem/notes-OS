---
- name: Install docker
  apt:
    name: docker.io
    state: present
    update_cache: true

- name: Start docker
  service:
    name: docker
    state: started
    enabled: true

- name: Install docker compose
  apt:
    name: docker-compose-v2
    state: present

- name: Add deploy to docker group
  user:
    name: deploy
    groups: docker
    append: true

