name: ci/cd
on:
  push:
    branches: [main, feature]
  pull_request:
    branches: [main]
jobs:
  secrets:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
  backend:
    needs: secrets
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov pytest-xdist pytest-asyncio pip-audit httpx
      - name: Dependency vulnerability scan
        run: pip-audit
      - name: Ruff checks
        run: ruff check app
      - name: Run test
        env:
            PYTHONPATH: ${{ github.workspace }}
        run: pytest -n auto --cov=. --cov-report=term-missing --asyncio-mode=auto -q
  
  docker:
    needs: backend
    runs-on: ubuntu-24.04
    steps:

      - uses: actions/checkout@v4
      - run: |
            cat > .env <<EOF
            POSTGRES_DB=${{vars.POSTGRES_DB}}
            POSTGRES_USER=${{vars.POSTGRES_USER}}
            POSTGRES_PASSWORD=${{secrets.POSTGRES_PASSWORD}}
            REDIS_URL=${{vars.REDIS_URL}}
            DATABASE_URL=${{secrets.DATABASE_URL}}
            TELEGRAM_TOKEN=${{secrets.TELEGRAM_TOKEN}}
            TELEGRAM_ADMIN=${{vars.TELEGRAM_ADMIN}}
            SMTP_FROM=${{vars.SMTP_FROM}}
            SMTP_USERNAME=${{vars.SMTP_USERNAME}}
            ALERT_EMAIL=${{vars.ALERT_EMAIL}}
            SMTP_PASSWORD=${{secrets.SMTP_PASSWORD}}
            EOF
      - name: Generate Alertmanager config
        run: |
            export $(grep -v '^#' .env | xargs)
            envsubst < monitoring/alertmanager.yml.tpl > monitoring/alertmanager.yml
      - name: Validate compose config
        run: docker compose config
      - run: docker compose up -d --build
      - name: Check alembic version
        run: docker compose exec -T backend1 alembic current
      - name: Check pending migrations
        run: docker compose exec -T backend1 alembic check
      - run: |
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:8181/health && exit 0
            sleep 2
          done
          exit 1
      - if: success()
        run: docker ps
      - if: failure()
        run: docker compose logs
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y trivy
      - name: Scan backend image
        run: trivy image backend:v1.0 --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1
      - name: Scan nginx image
        run: trivy image nginx-custom:v1 --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1
      - name: Scan frontend image
        run: trivy image frontend:v1.0 --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1
      - name: Scan postgres image
        run: trivy image postgres:17-bookworm --severity HIGH,CRITICAL --ignore-unfixed 
      - name: Scan redis image
        run: trivy image redis:7-alpine --severity HIGH,CRITICAL --ignore-unfixed

      - if: always()
        run: |
          docker compose down -v
          rm -f .env monitoring/alertmanager.yml

  push-image:
    if: github.ref == 'refs/heads/main'
    needs: docker
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
      - name: Build and Push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./app/backend/Dockerfile
          push: true
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
              ghcr.io/rabs1stem/notes-backend:${{github.sha}}
              ghcr.io/rabs1stem/notes-backend:latest
      - name: Build and Push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./app/frontend
          file: Dockerfile
          push: true
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
              ghcr.io/rabs1stem/notes-frontend:${{github.sha}}
              ghcr.io/rabs1stem/notes-frontend:latest
      - name: Build and Push nginx
        uses: docker/build-push-action@v6
        with:
          context: ./nginx-docker
          file: Dockerfile
          push: true
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
              ghcr.io/rabs1stem/notes-nginx:${{github.sha}}
              ghcr.io/rabs1stem/notes-nginx:latest

