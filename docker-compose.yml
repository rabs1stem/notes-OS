services:
  note:
    container_name: note
    image: note_img:v1.0
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - 8000
    restart: unless-stopped
    volumes:
      - note_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    networks:
      - my

  nginx-edge:
    container_name: nginx-edge
    image: nginx:1.28-alpine
    volumes:
      - ./nginx-edge/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      - nginx-internal
    ports:
      - 8181:80
    networks:
      - my
  nginx-internal:
    container_name: nginx-internal
    image: nginx:1.28-alpine
    volumes:
      - ./nginx-internal/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      - note
    networks:
      - my
volumes:
  note_data:
networks: 
  my:
    driver: bridge