services:
  redis:
    container_name: redis
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: 
        - CMD
        - redis-cli
        - ping
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 7s
    volumes:
      - redis_data:/data
    expose:
      - 6379
    networks:
      - my
  
  note1:
    container_name: note1
    image: note_img:v1.0
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - 8000
    restart: unless-stopped
    volumes:
      - note_data:/app/data
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health')
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 7s
    command: 
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "1"
      - --proxy-headers
      - --forwarded-allow-ips=172.18.0.0/16
    networks:
      - my

  note2:
    container_name: note2
    image: note_img:v1.0
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - 8000
    restart: unless-stopped
    volumes:
      - note_data:/app/data
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health')
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 7s
    command: 
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "1"
      - --proxy-headers
      - --forwarded-allow-ips=172.18.0.0/16
    networks:
      - my

  nginx-edge:
    container_name: nginx-edge
    image: nginx:1.28-alpine
    volumes:
      - ./nginx-edge/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - -O
        - /dev/null
        - http://127.0.0.1/health
      interval: 20s
      timeout: 5s
      retries: 3
    depends_on:
      nginx-internal:
        condition: service_healthy
    ports:
      - 8181:80
    networks:
      - my

  nginx-internal:
    container_name: nginx-internal
    image: nginx:1.28-alpine
    volumes:
      - ./nginx-internal/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - -O
        - /dev/null
        - http://127.0.0.1/health
      interval: 20s
      timeout: 5s
      retries: 3
    depends_on:
      note1:
        condition: service_healthy
      note2:
        condition: service_healthy
    networks:
      - my
volumes:
  note_data:
  redis_data:
networks: 
  my:
    driver: bridge