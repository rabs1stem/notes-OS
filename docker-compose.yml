services:
  postgres:
    container_name: postgres
    image: postgres:17-bookworm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: 
        - CMD-SHELL
        - pg_isready -U not_user -d not_db
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 7s
    expose:
      - 5432
    networks:
      - my
  
  redis:
    container_name: redis
    image: redis:8-alpine
    restart: unless-stopped
    healthcheck:
      test: 
        - CMD
        - redis-cli
        - ping
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 7s
    volumes:
      - redis_data:/data
    expose:
      - 6379
    networks:
      - my
  
  migrate:
    container_name: migrate
    image: backend:v1.0
    build:
      context: .
      dockerfile: ./app/backend/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - alembic
      - upgrade
      - head
    restart: "no"
    networks:
      - my

  backend1:
    container_name: backend1
    image: backend:v1.0
    build:
      context: .
      dockerfile: ./app/backend/Dockerfile
    expose:
      - 8000
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health')
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 7s
    command: 
      - gunicorn
      - app.main:app
      - -k
      - uvicorn.workers.UvicornWorker
      - --bind
      - 0.0.0.0:8000
      - --workers
      - "1"
    networks:
      - my

  backend2:
    container_name: backend2
    image: backend:v1.0
    build:
      context: .
      dockerfile: ./app/backend/Dockerfile
    expose:
      - 8000
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health')
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 7s
    command: 
      - gunicorn
      - app.main:app
      - -k
      - uvicorn.workers.UvicornWorker
      - --bind
      - 0.0.0.0:8000
      - --workers
      - "1"
    networks:
      - my

  frontend:
    container_name: frontend
    image: frontend:v1.0
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - -O
        - /dev/null
        - http://127.0.0.1/health
      interval: 20s
      timeout: 5s
      retries: 3
    expose:
      - 80
    networks:
      - my

  nginx-internal:
    container_name: nginx-internal
    image: nginx-custom:v1
    build:
      context: ./nginx-docker
      dockerfile: Dockerfile
    volumes:
      - ./nginx-internal/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - -O
        - /dev/null
        - http://127.0.0.1/health
      interval: 20s
      timeout: 5s
      retries: 3
    depends_on:
      backend1:
        condition: service_healthy
      backend2:
        condition: service_healthy
    networks:
      - my

  nginx-edge:
    container_name: nginx-edge
    image: nginx-custom:v1
    build:
      context: ./nginx-docker
      dockerfile: Dockerfile
    volumes:
      - ./nginx-edge/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - -O
        - /dev/null
        - http://127.0.0.1/health
      interval: 20s
      timeout: 5s
      retries: 3
    depends_on:
      nginx-internal:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - 8181:80
    networks:
      - my

  cadvisor:
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor:v0.52.0
    restart: unless-stopped
    privileged: true
    expose:
      - 8080
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - my

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.5.0
    restart: unless-stopped
    expose:
      - 9090
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
    networks:
      - my

  grafana:
    container_name: grafana
    image: grafana/grafana:12.1.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - my

  node-exporter:
    container_name: node-exporter
    image: prom/node-exporter:v1.9.1
    restart: unless-stopped
    expose:
      - 9100
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - my
 
  loki:
    container_name: loki
    image: grafana/loki:3.5.1
    restart: unless-stopped
    expose:
      - 3100
    command:
      - -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - my

  promtail:
    container_name: promtail
    image: grafana/promtail:3.5.1
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
    command:
      - -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - my

  alertmanager:
    container_name: alertmanager
    image: prom/alertmanager:v0.28.1
    restart: unless-stopped
    expose:
      - 9093
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - my

volumes:
  redis_data:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:
networks: 
  my:
    driver: bridge